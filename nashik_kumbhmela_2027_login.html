<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kumbh Mela 2027 — Nashik Simhastha</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    background: #060d14;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene { position: fixed; inset: 0; z-index: 0; }

  .sky {
    position: absolute; inset: 0;
    background: linear-gradient(175deg,
      #060d14 0%, #0d1f1a 18%, #1a3a2a 32%,
      #2d5a1a 48%, #6b8c2a 62%,
      #c8a832 74%, #e8c040 84%, #fff0a0 100%
    );
    animation: skyBreath 10s ease-in-out infinite alternate;
  }
  @keyframes skyBreath {
    0%   { filter: brightness(1) hue-rotate(0deg); }
    50%  { filter: brightness(1.08) hue-rotate(5deg); }
    100% { filter: brightness(0.94) hue-rotate(-4deg); }
  }

  .stars { position: absolute; inset: 0; pointer-events: none; }
  .star {
    position: absolute; background: #fff; border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0%   { opacity: 0.08; transform: scale(0.7); }
    100% { opacity: 0.9;  transform: scale(1.3); }
  }

  .moon {
    position: absolute; top: 7%; right: 10%;
    width: 56px; height: 56px; border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, #fffbe0, #e8c040 55%, #c8960a);
    box-shadow: 0 0 18px rgba(232,192,64,0.55), 0 0 55px rgba(200,150,10,0.22);
    animation: moonPulse 5s ease-in-out infinite alternate;
  }
  @keyframes moonPulse {
    0%   { box-shadow: 0 0 18px rgba(232,192,64,0.4),  0 0 50px rgba(200,150,10,0.18); }
    100% { box-shadow: 0 0 28px rgba(232,192,64,0.7),  0 0 80px rgba(200,150,10,0.38); }
  }

  .hills { position: absolute; bottom: 30%; left: 0; right: 0; pointer-events: none; }
  .temples { position: absolute; bottom: 28%; left: 0; right: 0; pointer-events: none; }

  .river { position: absolute; bottom: 0; left: 0; right: 0; height: 26%; pointer-events: none; overflow: hidden; }
  .water-body {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(20,60,40,0) 0%, rgba(20,80,50,0.4) 25%,
      rgba(15,55,40,0.65) 55%, rgba(10,35,28,0.88) 100%
    );
    animation: waterSway 7s ease-in-out infinite alternate;
  }
  @keyframes waterSway {
    0%   { transform: translateX(0) scaleY(1); }
    100% { transform: translateX(-2%) scaleY(1.04); }
  }
  .sheen {
    position: absolute; height: 2px; left: -60%; width: 220%;
    background: linear-gradient(to right, transparent, rgba(232,192,64,0.55), rgba(255,250,180,0.75), rgba(232,192,64,0.55), transparent);
    animation: sheenSlide 4.5s linear infinite;
  }
  @keyframes sheenSlide { 0% { transform: translateX(0); } 100% { transform: translateX(45%); } }
  .sheen2 {
    position: absolute; height: 1px; left: -40%; width: 180%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.35), transparent);
    animation: sheenSlide 6s linear infinite 2s;
    bottom: 45%;
  }

  .diya { position: absolute; bottom: 10%; animation: dyaDrift ease-in-out infinite; }
  @keyframes dyaDrift {
    0%,100% { transform: translate(0,0); }
    33%     { transform: translate(-6px,-5px); }
    66%     { transform: translate(5px,-2px); }
  }
  .diya svg { filter: drop-shadow(0 0 5px #e8c040) drop-shadow(0 0 14px #c87820); animation: dyaFlicker .25s ease-in-out infinite alternate; }
  @keyframes dyaFlicker { 0% { transform: scale(1) rotate(-1deg); } 100% { transform: scale(1.07) rotate(1deg); } }

  .petal {
    position: absolute; width: 7px; height: 11px; border-radius: 50% 50% 50% 0;
    animation: petalDrop linear infinite; pointer-events: none;
  }
  @keyframes petalDrop {
    0%   { transform: translateY(-10px) rotate(0deg); opacity: 0.85; }
    100% { transform: translateY(110vh) rotate(380deg); opacity: 0; }
  }

  .ff {
    position: absolute; border-radius: 50%;
    background: #e8c040; box-shadow: 0 0 5px #e8c040;
    animation: ffDrift ease-in-out infinite; pointer-events: none;
  }
  @keyframes ffDrift {
    0%,100% { opacity: 0; transform: translate(0,0); }
    20%     { opacity: 1; }
    80%     { opacity: 0.7; }
    100%    { opacity: 0; transform: translate(var(--dx), var(--dy)); }
  }

  .badge-top {
    position: absolute; top: 6%; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    pointer-events: none;
  }
  .om-sym {
    font-size: 2.6rem; color: rgba(232,192,64,0.22);
    animation: omPulse 5s ease-in-out infinite; font-family: serif;
  }
  @keyframes omPulse {
    0%,100% { opacity: 0.18; transform: scale(1); }
    50%     { opacity: 0.38; transform: scale(1.07); }
  }
  .simha-tag {
    font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.35em;
    color: rgba(232,192,64,0.3); text-transform: uppercase;
  }

  /* ─── Login Card ─── */
  .login-wrap {
    position: relative; z-index: 10; width: 420px; max-width: 95vw;
    animation: cardIn 1.3s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0; transform: translateY(36px);
  }
  @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }

  .card-glow {
    position: absolute; inset: -2px; border-radius: 20px;
    background: linear-gradient(135deg, #e8c04044, #6b8c2a44, #c8a83222, #e8c04044);
    background-size: 300% 300%;
    animation: glowCycle 5s ease infinite; filter: blur(1px);
  }
  @keyframes glowCycle {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .card {
    position: relative;
    background: rgba(6,13,20,0.84);
    backdrop-filter: blur(26px); -webkit-backdrop-filter: blur(26px);
    border-radius: 18px;
    border: 1px solid rgba(232,192,64,0.22);
    padding: 42px 40px 38px;
    box-shadow: 0 0 55px rgba(107,140,42,0.2), 0 0 110px rgba(6,13,20,0.7),
                inset 0 1px 0 rgba(255,248,180,0.1);
  }
  .card::before, .card::after {
    content: ''; position: absolute;
    width: 22px; height: 22px; border-color: rgba(232,192,64,0.55); border-style: solid;
  }
  .card::before { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  .card::after  { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

  .logo-area { text-align: center; margin-bottom: 28px; animation: logoIn 1.4s cubic-bezier(0.16,1,0.3,1) 0.15s both; }
  @keyframes logoIn { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }

  .mandala-wrap { display: inline-block; margin-bottom: 10px; animation: mandalaRot 22s linear infinite; }
  @keyframes mandalaRot { from { transform: rotate(0); } to { transform: rotate(360deg); } }

  .site-title {
    font-family: 'Cinzel', serif; font-size: 1.8rem; font-weight: 700; letter-spacing: 0.1em;
    background: linear-gradient(135deg, #e8c040, #6b8c2a, #e8c040, #c8a832);
    background-size: 250% auto; -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; animation: shimmer 3.5s linear infinite; line-height: 1.2;
  }
  @keyframes shimmer { 0% { background-position: 0%; } 100% { background-position: 250%; } }

  .site-sub { font-size: 0.78rem; color: rgba(232,192,64,0.5); letter-spacing: 0.3em; text-transform: uppercase; margin-top: 4px; }
  .site-loc { font-size: 0.7rem; color: rgba(107,140,42,0.65); letter-spacing: 0.2em; margin-top: 3px; font-style: italic; }

  .divider { display: flex; align-items: center; gap: 10px; margin: 0 auto 26px; width: 80%; }
  .dline { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(232,192,64,0.45), transparent); }
  .ddia  { width: 5px; height: 5px; background: #e8c040; transform: rotate(45deg); box-shadow: 0 0 7px #e8c040; }

  .form-group { margin-bottom: 16px; position: relative; animation: fieldIn 1s ease both; }
  .form-group:nth-child(1) { animation-delay: 0.45s; }
  .form-group:nth-child(2) { animation-delay: 0.6s; }
  @keyframes fieldIn { from { opacity: 0; transform: translateX(-18px); } to { opacity: 1; transform: translateX(0); } }

  .field-label { display: block; font-family: 'Cinzel', serif; font-size: 0.66rem; letter-spacing: 0.18em;
    color: rgba(232,192,64,0.65); margin-bottom: 7px; text-transform: uppercase; }

  .field-wrap { position: relative; }
  .field-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: rgba(232,192,64,0.45); font-size: 0.95rem; pointer-events: none; transition: color .3s; }
  .field-input {
    width: 100%; padding: 13px 13px 13px 40px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(232,192,64,0.18);
    border-radius: 10px; color: rgba(255,248,180,0.88);
    font-family: 'Cormorant Garamond', serif; font-size: 1rem; letter-spacing: 0.04em;
    outline: none; transition: all .3s;
  }
  .field-input::placeholder { color: rgba(255,248,180,0.18); font-style: italic; }
  .field-input:focus { border-color: rgba(232,192,64,0.55); background: rgba(232,192,64,0.05);
    box-shadow: 0 0 18px rgba(232,192,64,0.1), 0 0 0 3px rgba(232,192,64,0.07); }
  .field-input:focus ~ .field-bar { transform: scaleX(1); }
  .field-bar { position: absolute; bottom: 0; left: 10%; right: 10%; height: 1.5px;
    background: linear-gradient(to right, transparent, #e8c040, transparent);
    transform: scaleX(0); transition: transform .4s ease; border-radius: 999px; }

  .form-extras { display: flex; justify-content: space-between; align-items: center; margin-bottom: 26px;
    animation: fieldIn 1s ease 0.75s both; }
  .remember { display: flex; align-items: center; gap: 7px; cursor: pointer; }
  .remember input { width: 14px; height: 14px; accent-color: #e8c040; cursor: pointer; }
  .remember span { font-size: 0.76rem; color: rgba(255,248,180,0.4); font-style: italic; }
  .forgot { font-size: 0.74rem; color: rgba(232,192,64,0.5); cursor: pointer;
    font-family: 'Cinzel', serif; letter-spacing: 0.03em; transition: color .3s; border: none; background: none; }
  .forgot:hover { color: #e8c040; }

  .btn-login {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    font-family: 'Cinzel', serif; font-size: 0.92rem; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; cursor: pointer; position: relative; overflow: hidden;
    background: linear-gradient(135deg, #4a6b10, #6b8c2a, #c8a832, #e8c040, #c8a832, #6b8c2a, #4a6b10);
    background-size: 350% 100%; color: #0d1a04;
    animation: btnIn 1s ease 0.9s both, btnFlow 5s linear infinite;
    transition: transform .2s, box-shadow .3s;
    box-shadow: 0 4px 22px rgba(107,140,42,0.4), 0 0 0 1px rgba(232,192,64,0.28);
  }
  @keyframes btnIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes btnFlow { 0% { background-position: 0%; } 100% { background-position: 350%; } }
  .btn-login::after {
    content: ''; position: absolute; top: -50%; left: -70%; width: 35%; height: 200%;
    background: rgba(255,255,255,0.22); transform: skewX(-20deg);
    animation: btnShine 3.5s ease-in-out infinite;
  }
  @keyframes btnShine { 0% { left: -70%; } 100% { left: 130%; } }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(107,140,42,0.55), 0 0 0 1px rgba(232,192,64,0.5); }
  .btn-login:active { transform: translateY(0); }

  .signup-row { text-align: center; margin-top: 20px; font-size: 0.78rem;
    color: rgba(255,248,180,0.28); animation: fieldIn 1s ease 1.1s both; }
  .signup-row a { color: rgba(232,192,64,0.65); text-decoration: none;
    font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 0.07em; transition: color .3s; cursor: pointer; }
  .signup-row a:hover { color: #e8c040; }

  .lotus { text-align: center; margin-bottom: 5px; font-size: 1.3rem;
    animation: lotusFloat 3.5s ease-in-out infinite; }
  @keyframes lotusFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

  .countdown-badge {
    position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #4a6b10, #6b8c2a);
    border: 1px solid rgba(232,192,64,0.35); border-radius: 999px;
    padding: 4px 18px; white-space: nowrap;
    font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.2em;
    color: #e8c040; box-shadow: 0 0 14px rgba(107,140,42,0.4);
    animation: badgePop 1.2s cubic-bezier(0.16,1,0.3,1) 0.1s both;
  }
  @keyframes badgePop { from { opacity: 0; transform: translateX(-50%) scale(0.8); } to { opacity: 1; transform: translateX(-50%) scale(1); } }
</style>
</head>
<body>

<div class="scene">
  <div class="sky"></div>
  <div class="stars" id="stars"></div>
  <div class="moon"></div>

  <div class="badge-top">
    <div class="om-sym">ॐ</div>
    <div class="simha-tag">Simhastha Kumbh Mela</div>
  </div>

  <!-- Sahyadri Hills -->
  <div class="hills">
    <svg viewBox="0 0 1000 160" width="100%" height="130" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="hillGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1a3a18" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#0d1a0a" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="hillGrad2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0d2a10" stop-opacity="0.95"/>
          <stop offset="100%" stop-color="#060d06" stop-opacity="1"/>
        </linearGradient>
      </defs>
      <path d="M0,160 L0,90 Q80,20 180,60 Q280,95 380,40 Q480,0 560,30 Q640,58 700,25 Q780,-5 850,35 Q920,65 1000,50 L1000,160 Z" fill="url(#hillGrad2)" opacity="0.7"/>
      <path d="M0,160 L0,120 Q60,70 150,90 Q240,108 320,72 Q400,40 480,65 Q560,88 640,55 Q720,28 800,60 Q880,88 1000,70 L1000,160 Z" fill="url(#hillGrad)"/>
    </svg>
  </div>

  <!-- Temples: Trimbakeshwar + Kalaram + others -->
  <div class="temples">
    <svg viewBox="0 0 1000 260" width="100%" height="200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="tg1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1a2e0a" stop-opacity="0.97"/>
          <stop offset="100%" stop-color="#060d06" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="tg2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0d1f06" stop-opacity="0.88"/>
          <stop offset="100%" stop-color="#060d06" stop-opacity="1"/>
        </linearGradient>
      </defs>

      <!-- Far left small temple -->
      <g fill="url(#tg2)">
        <rect x="15" y="160" width="50" height="100"/>
        <polygon points="40,75 10,160 70,160"/>
        <polygon points="40,50 33,82 47,82"/>
        <rect x="34" y="30" width="12" height="22"/>
        <rect x="38" y="14" width="4" height="18"/>
        <rect x="20" y="160" width="8" height="36"/>
        <rect x="52" y="160" width="8" height="36"/>
        <polygon points="24,132 14,160 34,160"/>
        <polygon points="56,132 46,160 66,160"/>
        <rect x="32" y="176" width="16" height="84"/>
        <rect x="35" y="12" width="10" height="4" fill="#c8a832" opacity="0.8"/>
      </g>

      <!-- Kalaram Temple (left) -->
      <g fill="url(#tg1)">
        <rect x="90" y="140" width="110" height="120"/>
        <polygon points="145,60 82,140 208,140"/>
        <polygon points="145,35 137,72 153,72"/>
        <rect x="138" y="14" width="14" height="23"/>
        <rect x="143" y="4" width="4" height="12"/>
        <polygon points="145,-2 140,6 150,6" fill="#e8c040" opacity="0.7"/>
        <rect x="94" y="170" width="20" height="90"/>
        <polygon points="104,125 89,170 119,170"/>
        <rect x="180" y="170" width="20" height="90"/>
        <polygon points="190,125 175,170 205,170"/>
        <rect x="125" y="200" width="40" height="60"/>
        <rect x="82" y="140" width="126" height="7" opacity="0.5"/>
        <rect x="86" y="162" width="118" height="4" opacity="0.4"/>
        <rect x="86" y="178" width="118" height="3" opacity="0.3"/>
        <rect x="142" y="-12" width="3" height="18" fill="#6b8c2a" opacity="0.9"/>
        <polygon points="145,-10 145,2 158,-4" fill="#e8c040" opacity="0.8"/>
      </g>

      <!-- Trimbakeshwar — centre, 3-peak shikhara -->
      <g fill="url(#tg1)">
        <rect x="370" y="105" width="260" height="155"/>
        <polygon points="500,0 374,105 626,105"/>
        <polygon points="430,28 395,105 465,105"/>
        <polygon points="570,28 535,105 605,105"/>
        <rect x="494" y="-22" width="12" height="24"/>
        <rect x="498" y="-38" width="4" height="18"/>
        <polygon points="500,-45 495,-36 505,-36" fill="#e8c040" opacity="0.75"/>
        <rect x="496" y="-50" width="8" height="6" fill="#e8c040" opacity="0.5"/>
        <rect x="428" y="20" width="4" height="10" fill="#c8a832" opacity="0.7"/>
        <rect x="568" y="20" width="4" height="10" fill="#c8a832" opacity="0.7"/>
        <rect x="376" y="155" width="45" height="105"/>
        <polygon points="398,88 370,155 426,155"/>
        <rect x="579" y="155" width="45" height="105"/>
        <polygon points="601,88 574,155 628,155"/>
        <rect x="455" y="178" width="90" height="82"/>
        <rect x="370" y="105" width="260" height="9" opacity="0.55"/>
        <rect x="374" y="130" width="252" height="5" opacity="0.42"/>
        <rect x="374" y="150" width="252" height="4" opacity="0.32"/>
        <rect x="374" y="168" width="252" height="3" opacity="0.25"/>
        <rect x="497" y="-62" width="3" height="14" fill="#6b8c2a" opacity="0.95"/>
        <polygon points="500,-60 500,-46 515,-53" fill="#e8c040" opacity="0.9"/>
      </g>

      <!-- Right temple group -->
      <g fill="url(#tg1)">
        <rect x="800" y="140" width="110" height="120"/>
        <polygon points="855,60 792,140 918,140"/>
        <polygon points="855,35 847,72 863,72"/>
        <rect x="848" y="14" width="14" height="23"/>
        <rect x="852" y="4" width="5" height="12"/>
        <polygon points="855,-2 850,6 860,6" fill="#e8c040" opacity="0.7"/>
        <rect x="804" y="170" width="20" height="90"/>
        <polygon points="814,125 799,170 829,170"/>
        <rect x="890" y="170" width="20" height="90"/>
        <polygon points="900,125 885,170 915,170"/>
        <rect x="835" y="200" width="40" height="60"/>
        <rect x="792" y="140" width="126" height="7" opacity="0.5"/>
        <rect x="796" y="162" width="118" height="4" opacity="0.4"/>
        <rect x="852" y="-12" width="3" height="18" fill="#6b8c2a" opacity="0.9"/>
        <polygon points="855,-10 855,2 868,-4" fill="#e8c040" opacity="0.8"/>
      </g>

      <!-- Far right small temple -->
      <g fill="url(#tg2)">
        <rect x="935" y="160" width="50" height="100"/>
        <polygon points="960,75 930,160 990,160"/>
        <polygon points="960,50 953,82 967,82"/>
        <rect x="954" y="30" width="12" height="22"/>
        <rect x="958" y="14" width="4" height="18"/>
        <rect x="940" y="160" width="8" height="36"/>
        <rect x="972" y="160" width="8" height="36"/>
        <polygon points="944,132 934,160 954,160"/>
        <polygon points="976,132 966,160 986,160"/>
        <rect x="952" y="176" width="16" height="84"/>
        <rect x="955" y="12" width="10" height="4" fill="#c8a832" opacity="0.8"/>
      </g>

      <!-- Pilgrim crowd -->
      <g fill="#060d14" opacity="0.92">
        <ellipse cx="230" cy="258" rx="13" ry="7"/><rect x="226" y="237" width="8" height="21"/>
        <ellipse cx="254" cy="255" rx="12" ry="6"/><rect x="250" y="236" width="8" height="20"/>
        <ellipse cx="276" cy="259" rx="13" ry="7"/><rect x="272" y="238" width="8" height="21"/>
        <ellipse cx="300" cy="256" rx="12" ry="6"/><rect x="296" y="237" width="8" height="20"/>
        <ellipse cx="322" cy="260" rx="13" ry="7"/><rect x="318" y="239" width="8" height="21"/>
        <ellipse cx="346" cy="256" rx="11" ry="6"/><rect x="342" y="237" width="8" height="20"/>
        <ellipse cx="654" cy="256" rx="11" ry="6"/><rect x="650" y="237" width="8" height="20"/>
        <ellipse cx="678" cy="260" rx="13" ry="7"/><rect x="674" y="239" width="8" height="21"/>
        <ellipse cx="702" cy="256" rx="12" ry="6"/><rect x="698" y="237" width="8" height="20"/>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 130; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.4 + 0.5;
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*55}%;width:${sz}px;height:${sz}px;--dur:${1.5+Math.random()*3.5}s;animation-delay:${Math.random()*5}s;opacity:${Math.random()*0.5+0.1};`;
    starsEl.appendChild(s);
  }

  // Diyas
  const dyasEl = document.getElementById('diyas');
  const dc = ['#e8c040','#c8a832','#6b8c2a','#a8b820','#e8d020'];
  for (let i = 0; i < 14; i++) {
    const d = document.createElement('div');
    d.className = 'diya';
    const c = dc[i % dc.length];
    d.style.cssText = `left:${4+(i*7)+Math.random()*2}%;animation-duration:${3+Math.random()*4}s;animation-delay:${Math.random()*3}s;`;
    d.innerHTML = `<svg width="26" height="19" viewBox="0 0 26 19" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="13" cy="15" rx="10" ry="4" fill="${c}" opacity="0.88"/>
      <path d="M5,15 Q13,9 21,15" fill="${c}" opacity="0.65"/>
      <ellipse cx="13" cy="12" rx="3.5" ry="2.8" fill="rgba(200,220,100,0.35)"/>
      <path d="M13,11 Q11,5.5 13,2 Q15,5.5 13,11" fill="#fffbe0" opacity="0.95"/>
      <ellipse cx="13" cy="2.5" rx="1.4" ry="1.8" fill="#e8d060" opacity="0.82"/>
      <circle cx="13" cy="1.8" r="0.9" fill="white" opacity="0.88"/>
    </svg>`;
    dyasEl.appendChild(d);
  }

  // Petals
  const petEl = document.getElementById('petals');
  const pc = ['#e8c040','#c8a832','#6b8c2a','#8B1A1A','#ff9500','#ffb347','#a0c020'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const c = pc[Math.floor(Math.random() * pc.length)];
    p.style.cssText = `left:${Math.random()*100}%;top:-12px;background:${c};opacity:${0.5+Math.random()*0.4};transform:rotate(${Math.random()*360}deg);animation-duration:${7+Math.random()*8}s;animation-delay:${Math.random()*9}s;`;
    petEl.appendChild(p);
  }

  // Fireflies
  const ffEl = document.getElementById('ff');
  for (let i = 0; i < 28; i++) {
    const f = document.createElement('div');
    f.className = 'ff';
    const dx = (Math.random()-0.5)*180, dy = (Math.random()-0.5)*180;
    const sz = 2 + Math.random() * 2.5;
    f.style.cssText = `left:${Math.random()*100}%;top:${15+Math.random()*65}%;--dx:${dx}px;--dy:${dy}px;width:${sz}px;height:${sz}px;animation-duration:${3.5+Math.random()*5}s;animation-delay:${Math.random()*6}s;`;
    ffEl.appendChild(f);
  }

  function handleLogin(btn) {
    btn.textContent = '🙏 Jai Godavari Mata...';
    btn.style.pointerEvents = 'none';
    setTimeout(() => {
      btn.textContent = '✨ Welcome, Devotee!';
      btn.style.background = 'linear-gradient(135deg,#1a4a1a,#2d7a2d)';
    }, 1800);
  }
</script>
