# Free tier: Render web + static (cold start ~1 min after 15 min idle; 750 compute hrs/mo per workspace).
# Service names define public URLs: https://<name>.onrender.com
services:
  - type: web
    name: kumbh-ai-service
    runtime: python
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: kumbh-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: kumbh-ai-service
          property: hostport
      # Public origin of the static dashboard (browser CORS). Must match your site URL exactly.
      - key: FRONTEND_URL
        value: https://kumbh-frontend.onrender.com

  - type: web
    name: kumbh-frontend
    runtime: static
    # Static sites: omit `plan` — Blueprint does not accept `plan: free` for runtime: static.
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Public API URL baked into the web app at build time (must be HTTPS, reachable from browsers & phones).
      - key: VITE_API_URL
        value: https://kumbh-backend-tlo1.onrender.com
