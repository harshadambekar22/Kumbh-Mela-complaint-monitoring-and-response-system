name: Mobile APK Build

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Trigger Android APK build
        run: eas build --platform android --profile public-apk --non-interactive --no-wait
